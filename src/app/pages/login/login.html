<div class="min-h-screen bg-[#F5F6F8] flex flex-col items-center justify-center px-4 py-6 font-['Poppins',sans-serif]">

  <!-- Logo + Title -->
  <div class="flex flex-col items-center mb-5">
    <div class="w-24 h-24 sm:w-28 sm:h-28 bg-white rounded-2xl shadow-md flex items-center justify-center mb-3 overflow-hidden">
      <img src="/assets/logo-assac-blanco.png" alt="ASSAC INTEGRAL" class="w-16 h-16 sm:w-20 sm:h-20 object-contain" />
    </div>
    <h1 class="text-[#2D3E50] text-lg sm:text-xl font-bold tracking-widest uppercase">ASSAC INTEGRAL</h1>
    <p class="text-[#7A8FA6] text-[10px] sm:text-xs font-medium tracking-[0.3em] uppercase mt-0.5">Plataforma Administrativa</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-lg w-full max-w-sm sm:max-w-md px-6 sm:px-8 py-6 sm:py-7">

    <h2 class="text-[#C89B3C] text-xl sm:text-2xl font-semibold mb-0.5">Bienvenido</h2>
    <p class="text-[#9BAAB8] text-xs sm:text-sm mb-5">Ingrese sus credenciales para acceder al sistema.</p>

    <!-- Alerta -->
    <div
      *ngIf="alertaVisible"
      class="flex items-center gap-2 text-xs sm:text-sm px-3 py-2.5 rounded-lg mb-4 transition-all"
      [ngClass]="alertaTipo === 'error'
        ? 'bg-red-50 text-red-600 border border-red-200'
        : 'bg-green-50 text-green-600 border border-green-200'"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5 shrink-0">
        <circle cx="12" cy="12" r="10"/>
        <polyline *ngIf="alertaTipo === 'exito'" points="20 6 9 17 4 12"/>
        <line *ngIf="alertaTipo === 'error'" x1="15" y1="9" x2="9" y2="15"/>
        <line *ngIf="alertaTipo === 'error'" x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <span>{{ alertaMensaje }}</span>
    </div>

    <!-- Correo -->
    <div class="mb-4">
      <label class="block text-[#2D3E50] text-xs sm:text-sm font-medium mb-1.5">Correo Electrónico</label>
      <div class="flex items-center gap-2.5 border border-[#E2E8F0] rounded-xl px-3.5 py-2.5 bg-[#F8FAFC] focus-within:border-[#C89B3C] focus-within:ring-2 focus-within:ring-[#C89B3C]/20 transition-all">
        <svg viewBox="0 0 24 24" fill="none" stroke="#9BAAB8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5 shrink-0">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <input
          type="email"
          [(ngModel)]="email"
          placeholder="ejemplo@correo.com"
          class="flex-1 bg-transparent outline-none text-xs sm:text-sm text-[#2D3E50] placeholder-[#B0BFCF]"
        />
      </div>
    </div>

    <!-- Contraseña -->
    <div class="mb-4">
      <div class="flex items-center justify-between mb-1.5">
        <label class="text-[#2D3E50] text-xs sm:text-sm font-medium">Contraseña</label>
      </div>
      <div class="flex items-center gap-2.5 border border-[#E2E8F0] rounded-xl px-3.5 py-2.5 bg-[#F8FAFC] focus-within:border-[#C89B3C] focus-within:ring-2 focus-within:ring-[#C89B3C]/20 transition-all">
        <svg viewBox="0 0 24 24" fill="none" stroke="#9BAAB8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5 shrink-0">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input
          [type]="mostrarPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          placeholder="········"
          class="flex-1 bg-transparent outline-none text-xs sm:text-sm text-[#2D3E50] placeholder-[#B0BFCF]"
        />
        <button type="button" (click)="togglePassword()" class="text-[#9BAAB8] hover:text-[#C89B3C] transition-colors">
          <svg *ngIf="!mostrarPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="mostrarPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Botón Ingresar -->
    <button
      (click)="ingresar()"
      [disabled]="cargando"
      class="w-full bg-[#C89B3C] hover:bg-[#B5882E] active:bg-[#A07825] text-white font-semibold text-xs sm:text-sm tracking-widest uppercase rounded-xl py-3 sm:py-3.5 flex items-center justify-center gap-2 transition-all duration-200 disabled:opacity-60 disabled:cursor-not-allowed shadow-md hover:shadow-lg"
    >
      <span *ngIf="!cargando">Ingresar</span>
      <svg *ngIf="!cargando" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      <svg *ngIf="cargando" class="animate-spin w-4 h-4" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="white" stroke-width="3" stroke-opacity="0.3"/>
        <path d="M12 2a10 10 0 0 1 10 10" stroke="white" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </button>

  </div>

  <!-- Footer -->
  <div class="mt-5 text-center text-[10px] sm:text-xs text-[#B0BFCF] space-y-0.5">
    <p>© 2024 ASSAC INTEGRAL S.A. Todos los derechos reservados.</p>
    <p>Si tiene problemas para acceder, contacte a <a href="#" class="text-[#C89B3C] font-medium hover:underline">Soporte Técnico</a>.</p>
  </div>

</div>
